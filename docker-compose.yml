version: '3.8'

services:
  # ORACLE Next.js app
  oracle:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      signal-api:
        condition: service_started
    networks:
      - oracle-net

  # Self-hosted PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - ./deploy/init-db.sql:/docker-entrypoint-initdb.d/000_init.sql
    environment:
      POSTGRES_USER: oracle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: oracle
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oracle"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - oracle-net

  # Signal messenger API (signal-cli-rest-api)
  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    restart: unless-stopped
    volumes:
      - signal_data:/home/.local/share/signal-cli
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      MODE: json-rpc
    networks:
      - oracle-net

  # Nginx reverse proxy with TLS
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - oracle
    networks:
      - oracle-net

volumes:
  postgres_data:
  signal_data:

networks:
  oracle-net:
    driver: bridge
